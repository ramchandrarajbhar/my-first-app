<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Editor Layout</title>
<style>
  body {
    margin: 0;
    display: flex;
    height: 100vh;
  }

  #sidebar {
    width: 10%;
    border-right: 1px solid #ccc;
    display: flex;
    flex-direction: column;
    padding: 10px;
    box-sizing: border-box;
  }

  #sidebar button {
    margin-bottom: 10px;
    padding: 10px;
    cursor: pointer;
  }

  #viewer {
    width: 90%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>

  <div id="sidebar">
    <button onclick="loadPage('https://data.instatfootball.tv/auth')">Instat Data</button>
    <button onclick="loadPage('https://www.google.com')">Google</button>
    <button onclick="loadPage('https://www.wikipedia.org')">Wikipedia</button>
  </div>

  <iframe id="viewer" src="https://data.instatfootball.tv/auth"></iframe>

  <script>
    function loadPage(url) {
      document.getElementById('viewer').src = url;
    }
  </script>

</body>
</html>
