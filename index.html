<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wave Hello World</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  h1 {
    font-size: 50px;
    display: flex;
  }

  h1 span {
    display: inline-block;
    animation: wave 0.5s ease-in-out infinite, colorChange 3s linear infinite;
    animation-delay: calc(var(--i) * 0.1s);
  }

  @keyframes wave {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  @keyframes colorChange {
    0%   { color: red; }
    25%  { color: orange; }
    50%  { color: green; }
    75%  { color: blue; }
    100% { color: red; }
  }
</style>
</head>
<body>

  <h1 id="text"></h1>

  <script>
    const message = "Namestey!";
    const h1 = document.getElementById("text");

    [...message].forEach((char, i) => {
      const span = document.createElement("span");
      span.textContent = char === " " ? "\u00A0" : char;
      span.style.setProperty("--i", i);
      h1.appendChild(span);
    });
  </script>

</body>
</html>
